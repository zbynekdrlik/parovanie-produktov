<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kontrola párovania — Forestshop</title>
  <link rel="stylesheet" href="/static/style.css?v=40">
</head>
<body>
  <script>try{if(localStorage.getItem('theme')==='dark')document.body.setAttribute('data-theme','dark');}catch(e){}</script>
  <aside class="sidebar">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L3 7v6c0 5 3.5 8 9 9 5.5-1 9-4 9-9V7z"/></svg></span>
      <span class="brandtxt">Forestshop<small>Párovač &amp; dashboard</small></span>
    </div>
    <nav class="side-nav">
      <div class="nav-folder" id="folder-eshop">
        <button class="folder-head" id="folderEshopHead" type="button" aria-expanded="true" aria-controls="folder-eshop-body">
          <svg class="folder-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          <span class="ftitle">Eshop</span>
          <svg class="folder-chev" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="folder-body" id="folder-eshop-body">
          <div class="tabs" id="tabs"></div>
          <div class="nav-sec">Automatizácie</div>
          <div class="tabs" id="autoTabs"></div>
        </div>
      </div>
    </nav>
    <!-- Admin 'Užívatelia' — standalone at the sidebar bottom, OUTSIDE the
         'Eshop' folder (#118 refinement); populated admin-only by renderTabs(). -->
    <nav class="tabs users-nav" id="usersNav" aria-label="Správa užívateľov"></nav>
    <div class="sidefoot">
      <div class="userbox" id="userBox" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
        <span class="useremail" id="userEmail"></span>
        <button class="logoutbtn" id="logoutBtn" type="button" title="Odhlásiť sa">Odhlásiť</button>
      </div>
      <button class="themebtn" id="themeBtn" type="button" aria-pressed="false">
        <svg viewBox="0 0 24 24" id="themeIcon"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
        <span id="themeLbl">Tmavý mód</span>
      </button>
      <div class="ver">verzia <span id="version" data-testid="version">…</span></div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-head">
        <h1 id="pageTitle">Kontrola párovania</h1>
        <div class="sub" id="pageSub"></div>
      </div>
      <div class="topacts">
        <div class="downloads"><a id="dlImport" href="/api/import" download>⬇ Stiahnuť import</a></div>
      </div>
      <div class="progress"><span id="progressText">…</span><div class="bar"><div id="progressBar"></div></div></div>
      <div class="filters" id="filters"></div>
    </header>
    <main id="list"></main>
    <div id="empty" class="empty" hidden>Žiadne produkty v tomto filtri.</div>
    <section id="tab-search" hidden>
      <input id="searchBox" type="search" autocomplete="off"
             placeholder="Hľadať produkt podľa názvu, dodávateľa alebo kódu…">
      <div id="searchResults"></div>
    </section>
    <section id="tab-notes" hidden></section>
    <section id="tab-users" hidden></section>
    <section id="tab-posta" hidden></section>
    <section id="tab-shoptet_sync" hidden></section>
    <section id="tab-parovania_eshop" hidden></section>
    <section id="tab-dodavatelsky_sklad" hidden></section>
  </div>
  <script src="/static/app.js?v=41"></script>
</body>
</html>
