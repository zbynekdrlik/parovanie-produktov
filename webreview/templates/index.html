<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forestshop</title>
  <!-- Favicon (#175): inline SVG data-URI of the brand shield (same mark as the
       sidebar .brand .logo) — white shield on the brand-green rounded square. -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%23356B32'/%3E%3Cpath d='M12 4.2 5.4 7.6v4.7c0 3.9 2.7 6.3 6.6 7.3 3.9-1 6.6-3.4 6.6-7.3V7.6z' fill='%23fff'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/style.css?v=57">
</head>
<body>
  <script>try{if(localStorage.getItem('theme')==='dark')document.body.setAttribute('data-theme','dark');}catch(e){}</script>
  <aside class="sidebar">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L3 7v6c0 5 3.5 8 9 9 5.5-1 9-4 9-9V7z"/></svg></span>
      <span class="brandtxt">Forestshop<small>Firemný systém</small></span>
    </div>
    <nav class="side-nav">
      <div class="nav-folder" id="folder-eshop">
        <button class="folder-head" id="folderEshopHead" type="button" aria-expanded="true" aria-controls="folder-eshop-body">
          <svg class="folder-ico" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          <span class="ftitle">Eshop</span>
          <svg class="folder-chev" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="folder-body" id="folder-eshop-body">
          <div class="tabs" id="tabs"></div>
          <div class="nav-sec">Automatizácie</div>
          <div class="tabs" id="autoTabs"></div>
        </div>
      </div>
    </nav>
    <!-- Admin 'Užívatelia' — standalone at the sidebar bottom, OUTSIDE the
         'Eshop' folder (#118 refinement); populated admin-only by renderTabs(). -->
    <nav class="tabs users-nav" id="usersNav" aria-label="Správa užívateľov"></nav>
    <!-- 'Vývoj' (#115) — standalone at the very bottom, visible to every logged-in
         user; lists this repo's GitHub issues. Populated by renderTabs(). -->
    <nav class="tabs dev-nav" id="devNav" aria-label="Vývoj"></nav>
    <div class="sidefoot">
      <div class="userbox" id="userBox" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
        <span class="useremail" id="userEmail"></span>
        <button class="logoutbtn" id="logoutBtn" type="button" title="Odhlásiť sa">Odhlásiť</button>
      </div>
      <button class="themebtn" id="themeBtn" type="button" aria-pressed="false">
        <svg viewBox="0 0 24 24" id="themeIcon"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>
        <span id="themeLbl">Tmavý mód</span>
      </button>
      <!-- Edit-mode toggle (#176): admin-only. Off by default → the per-tab ✏️
           rename pencils are hidden (full dashboard names visible). Unhidden by
           initEditLabels() only for an admin; non-admins never see it. -->
      <button class="editbtn" id="editLabelsBtn" type="button" hidden aria-pressed="false">
        <span class="editico" aria-hidden="true">✏️</span>
        <span class="editlbl">Upraviť názvy</span>
      </button>
      <div class="ver">verzia <span id="version" data-testid="version">…</span></div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-head">
        <h1 id="pageTitle">Kontrola párovania</h1>
        <div class="sub" id="pageSub"></div>
      </div>
      <div class="topacts">
        <div class="downloads"><a id="dlImport" href="/api/import" download>⬇ Stiahnuť import</a></div>
      </div>
      <div class="progress"><span id="progressText">…</span><div class="bar"><div id="progressBar"></div></div></div>
      <div class="filters" id="filters"></div>
    </header>
    <main id="list"></main>
    <div id="empty" class="empty" hidden>Žiadne produkty v tomto filtri.</div>
    <section id="tab-nedostupne" hidden></section>
    <section id="tab-vystavy" hidden></section>
    <section id="tab-search" hidden>
      <input id="searchBox" type="search" autocomplete="off"
             placeholder="Hľadať produkt podľa názvu, dodávateľa alebo kódu…">
      <div id="searchResults"></div>
    </section>
    <section id="tab-notes" hidden></section>
    <section id="tab-users" hidden></section>
    <section id="tab-posta" hidden></section>
    <section id="tab-shoptet_sync" hidden></section>
    <section id="tab-parovania_eshop" hidden></section>
    <section id="tab-grube_externalcode" hidden></section>
    <section id="tab-split_links" hidden></section>
    <section id="tab-dodavatelsky_sklad" hidden></section>
    <section id="tab-riziko_vypadku" hidden></section>
    <section id="tab-restock_skladom" hidden></section>
    <section id="tab-stock_skladom" hidden></section>
    <section id="tab-orders_reminder" hidden></section>
    <section id="tab-image_health" hidden></section>
    <section id="tab-dev" hidden></section>
  </div>

  <!-- Idea lightbulb (#115): any logged-in user writes an idea → it becomes a
       GitHub issue in the 'Vývoj' list. Fixed bottom-right, present on every tab. -->
  <button id="ideaBtn" class="idea-fab" type="button"
          title="Zapíš nápad na vývoj" aria-label="Zapíš nápad na vývoj">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M9 18h6M10 21h4M12 3a6 6 0 00-4 10.5c.7.7 1 1.3 1 2.5h6c0-1.2.3-1.8 1-2.5A6 6 0 0012 3z"/>
    </svg>
  </button>
  <div id="ideaModal" class="idea-modal" hidden>
    <div class="idea-backdrop" id="ideaBackdrop"></div>
    <div class="idea-dialog" role="dialog" aria-modal="true" aria-labelledby="ideaHead">
      <h2 id="ideaHead">💡 Nový nápad na vývoj</h2>
      <p class="idea-hint">Zapíš nápad — vytvorí sa úloha v zozname „Vývoj".</p>
      <input id="ideaTitleInput" type="text" maxlength="200"
             placeholder="Nápad v skratke (názov)…" autocomplete="off">
      <textarea id="ideaDescInput" rows="4" maxlength="5000"
                placeholder="Podrobnosti (voliteľné)…"></textarea>
      <div id="ideaMsg" class="idea-msg" hidden></div>
      <div class="idea-acts">
        <button id="ideaCancel" class="btn ghost" type="button">Zrušiť</button>
        <button id="ideaSubmit" class="btn good" type="button">➕ Vytvoriť úlohu</button>
      </div>
    </div>
  </div>
  <!-- Náhľad + odoslanie zákazníckeho e-mailu (#100): žiadny e-mail sa neposiela
       automaticky — manažér najprv vidí komu + čo pôjde, potvrdí „Odoslať". -->
  <div id="ndModal" class="nd-modal" hidden>
    <div class="nd-backdrop" id="ndBackdrop"></div>
    <div class="nd-dialog" role="dialog" aria-modal="true" aria-labelledby="ndHead">
      <h2 id="ndHead">Náhľad e-mailu</h2>
      <p class="nd-hint" id="ndHint"></p>
      <div id="ndRecipients" class="nd-recipients"></div>
      <iframe id="ndPreview" class="nd-preview" title="Náhľad e-mailu" sandbox=""></iframe>
      <div id="ndMsg" class="nd-msg" hidden></div>
      <div class="nd-acts">
        <button id="ndCancel" class="btn ghost" type="button">Zrušiť</button>
        <button id="ndSend" class="btn good" type="button">✉ Odoslať</button>
      </div>
    </div>
  </div>
  <script src="/static/app.js?v=66"></script>
</body>
</html>
