<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Prihlásenie{% endblock %} — Forestshop</title>
  <style>
    :root { --bg:#f3f5f2; --card:#fff; --ink:#1d2b20; --muted:#68766b;
            --accent:#2f7d43; --line:#dde3dc; --err:#b3261e; --okc:#2f7d43; }
    body[data-theme=dark] { --bg:#141a15; --card:#1d251e; --ink:#e6ece6;
            --muted:#93a095; --accent:#54b06c; --line:#2c362d; --err:#ff8a80;
            --okc:#7dd694; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center;
           justify-content:center; background:var(--bg); color:var(--ink);
           font:15px/1.45 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; }
    .authcard { width:min(400px,92vw); background:var(--card);
                border:1px solid var(--line); border-radius:14px;
                padding:28px 26px 20px; box-shadow:0 8px 30px rgba(0,0,0,.07); }
    .brand { display:flex; gap:10px; align-items:center; margin-bottom:18px; }
    .brand svg { width:28px; height:28px; flex:none; fill:none;
                 stroke:var(--accent); stroke-width:1.7; }
    .brand b { font-size:17px; line-height:1.2; }
    .brand small { display:block; color:var(--muted); font-weight:400; font-size:12px; }
    h1 { font-size:16px; margin:0 0 12px; }
    label { display:block; font-size:13px; color:var(--muted); margin:12px 0 4px; }
    input { width:100%; padding:10px 12px; border:1px solid var(--line);
            border-radius:8px; background:var(--bg); color:var(--ink); font:inherit; }
    input:focus { outline:2px solid var(--accent); outline-offset:0;
                  border-color:transparent; }
    button { width:100%; margin-top:16px; padding:11px; border:0; border-radius:8px;
             background:var(--accent); color:#fff; font:inherit; font-weight:600;
             cursor:pointer; }
    button:hover { filter:brightness(1.06); }
    .err { margin:12px 0 0; padding:9px 12px; border-radius:8px; font-size:13.5px;
           background:rgba(179,38,30,.1); color:var(--err); }
    .ok { margin:0 0 12px; padding:9px 12px; border-radius:8px; font-size:13.5px;
          background:rgba(47,125,67,.1); color:var(--okc); }
    .links { margin-top:14px; font-size:13px; text-align:center; }
    .links a { color:var(--accent); text-decoration:none; }
    .links a:hover { text-decoration:underline; }
    .ver { margin-top:18px; text-align:center; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <script>try{if(localStorage.getItem('theme')==='dark')document.body.setAttribute('data-theme','dark');}catch(e){}</script>
  <div class="authcard">
    <div class="brand">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L3 7v6c0 5 3.5 8 9 9 5.5-1 9-4 9-9V7z"/></svg>
      <b>Forestshop<small>Párovač &amp; dashboard</small></b>
    </div>
    {% block card %}{% endblock %}
    <div class="ver">verzia <span data-testid="version">v{{ version }}</span></div>
  </div>
</body>
</html>
